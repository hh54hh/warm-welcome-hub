    <meta property="og:title" content="مركز البدر — نظام إدارة المبيعات والمخزن" />
    <meta property="og:description" content="إدارة كاملة للبيع والمخزن والفواتير بدقة وسرعة." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // PWA Installation Support for all browsers
      let deferredPrompt = null;
      
      // Chrome, Edge, Opera - beforeinstallprompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('Install prompt available');
      });
      
      window.addEventListener('appinstalled', () => {
        console.log('App installed');
        deferredPrompt = null;
      });
      
      // Register Service Worker for offline support
      window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker
            .register('/service-worker.js', { scope: '/' })
            .then((reg) => {
              console.log('✓ Service Worker registered:', reg.scope);
            })
            .catch((err) => {
              console.warn('Service Worker registration failed:', err);
            });
        }
        
        // Log support info
        console.log('PWA Support:', {
          serviceWorker: 'serviceWorker' in navigator,
          webApp: 'standalone' in navigator,
          manifest: !!document.querySelector('link[rel="manifest"]'),
          iOS: /iPad|iPhone|iPod/.test(navigator.userAgent)
        });
      });
    </script>
  </body>
</html>
